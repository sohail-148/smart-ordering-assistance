services:
  - type: web
    name: shopai-backend
    runtime: node
    rootDir: .
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: GROK_API_KEY
        sync: false
      - key: GROK_API_URL
        value: https://api.groq.com/openai/v1
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_PATH
        value: ./data/ecommerce.db
